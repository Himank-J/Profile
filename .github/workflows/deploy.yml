name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'content/**'                         # re-build when posts are added/edited
      - 'scripts/generate-posts.mjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # Use npm install (not npm ci) — package-lock.json has corporate registry
        # resolved URLs from gpkg proxy that GitHub Actions can't authenticate against.
        # .npmrc in frontend/ sets registry=https://registry.npmjs.org/ to fix this.
        run: npm install --legacy-peer-deps
        working-directory: frontend

      - name: Generate posts.json + sitemap.xml + admin/config.yml
        run: node scripts/generate-posts.mjs
        working-directory: .
        env:
          # Change these secrets to switch domain — no code changes needed
          SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          GITHUB_REPO: Himank-J/Profile

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
          VITE_GITHUB_REPO: Himank-J/Profile

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
